<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>

<body bgcolor="#1E3A8A">

    <!-- Inicio Header -->
     <iframe src="../header.html" width="100%" height="120" scrolling="no" frameborder="0"></iframe>
    <!-- Fin Header -->

    <!-- INICIO MAIN EDGAR-->

    <main>
    <font color="#fff">
        <table width="60%" align="center">
            <tr align="center">
                <td>
                    <h1>Iniciar sesión</h1>
                    <p>Bienvenido de nuevo.<br>Ingresa tus credenciales.</p>
                </td>
            </tr>
        </table>

        <table width="60%" align="center">
            <tr align="center">
                <td>
                    <button type="button"><img src="../assets/images/png/google.png" width="16" alt="logo de google">&nbsp;Continuar con Google</button>
                    <button type="button"><img src="../assets/images/png/facebook.png" width="16" alt="logo de facebook">&nbsp;Continuar con Facebook</button>
                </td>
            </tr>
            <tr align="center">
                <td>
                    <p>— o continúa con tu correo —</p>
                </td>
            </tr>
        </table>

        <form action="../index.html" method="GET">
            <table width="60%" align="center" cellspacing="8">
                <tr>
                    <td align="right"><label for="email-field">Correo electrónico:</label></td>
                    <td><input type="email" id="email-field" name="usuario_email" placeholder="ejemplo@correo.com" required></td>
                </tr>
                <tr>
                    <td align="right"><label for="password-field">Contraseña:</label></td>
                    <td>
                        <input type="password" id="password-field" name="usuario_pass" placeholder="Mínimo 8 caracteres" required>
                        <button type="button" aria-label="Mostrar contraseña">👁</button>
                    </td>
                </tr>
                <tr>
                    <td></td>
                    <td>
                        <input type="checkbox" id="remember-check" name="recordar">
                        <label for="remember-check">Recordarme</label>
                    </td>
                </tr>
                <tr>
                    <td colspan="2" align="center">
                        <a href="recuperarcontraseña.html">¿Olvidaste tu contraseña?</a>
                    </td>
                </tr>
                <tr>
                    <td colspan="2" align="center">
                        <button type="submit">Iniciar sesión</button>
                    </td>
                </tr>
            </table>
        </form>

        <div align="center">
            <p>
                ¿No tienes una cuenta? &nbsp;
                <a href="registro.html">Regístrate aquí</a>
            </p>
        </div>
    </font>
</main>


    <!-- FIN MAIN EDGAR-->

    <!-- INICIO FOOTER OMAR-->
    <iframe src="../footer.html" width="100%" height="600" scrolling="no" frameborder="0"></iframe>
    <!-- FIN FOOTER OMAR-->


</body>

</html>
