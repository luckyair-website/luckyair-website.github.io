<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
 
<body>

    <!-- Inicio contenedor header -->
    <header>

        <table width="100%" height="80" border="1">
            <tr>
                <!-- Inicio contenedor-logo -->
                <td align="left" width="200" height="100">
                    <a href="../index.html">
                        <img src="../assets/images/png/logo.png" alt="Logo de la empresa" width="200px" height="100px">
                    </a>
                </td>
                <!-- Fin contenedor-logo -->

                <!-- Inicio contenedor de navegacion -->
                <td align="center">
                    <nav>
                        <font size="5">
                            <a href="../index.html">
                                <font color="blue">
                                    <small>Home</small>
                                </font>
                            </a>
                            &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
                            <a href="vuelos.html">
                                <font color="blue">
                                    <small>Vuelos</small>
                                </font>
                            </a>
                            &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
                            <a href="beneficios.html">
                                <font color="blue">
                                    <small>Beneficios</small>
                                </font>
                            </a>
                        </font>
                    </nav>
                </td>
                <!-- Fin contenedor de navegacion -->

                <!-- Inicio contenedor de Icono usuario -->
                <td align="center" width="200">
                    <a href="pages/login.html">
                        <img src="../assets/images/svg/user.svg" alt="Icono de usuario" width="40">
                    </a>
                    
                </td>
                <!-- Fin contenedor de Icono usuario -->
            </tr>
        </table>
    </header>
    <!-- Fin contenedor header -->

    <!-- INICIO MAIN EDGAR-->
    <center>
    <main>
        <main id="main-content">
            <section class="login-box" aria-labelledby="form-title">

                <header class="login-header">
                    <h1 id="form-title">Iniciar sesión</h1>
                    <p>Bienvenido de nuevo.<br>Ingresa tus credenciales.</p>
                </header>

                <div class="social-login">
                    <button type="button" aria-label="Iniciar sesión con Google">
                        <span aria-hidden="true">G</span>
                        Continuar con Google
                    </button>
                </div>

                <div class="divider" aria-hidden="true">
                    <span>o continúa con tu correo</span>
                </div>
                <br>
                <form action="" method="POST" id="">

                    <div class="input-group">
                        <label for="email-field">Correo electrónico *</label>
                        <input type="email" id="email-field" name="email" placeholder="ejemplo@correo.com" required>
                        <span class="error-text" id="email-error" role="alert"></span>
                    </div>
                    <br>
                    <div class="input-group">
                        <label for="password-field">Contraseña *</label>

                        <input type="password" id="password-field" name="password" placeholder="Mínimo 8 caracteres"
                            required>
                        <button type="button" aria-label="Mostrar contraseña">👁</button>
                        <span class="error-text" id="password-error" role="alert"></span>
                    </div>

                    <div class="form-footer-options">
                        <div class="remember-me">
                            <input type="checkbox" id="remember-check" name="remember">
                            <label for="remember-check">Recordarme</label>
                        </div>
                        <a href="" class="link-forgot">¿Olvidaste tu contraseña?</a>
                    </div>
                    <br>
                    <button type="submit" class="btn-submit">Iniciar sesión</button>
                </form>

                <footer class="register-footer">
                    <p>¿No tienes una cuenta? <a href="">Regístrate aquí</a></p>
                </footer>

            </section>
        </main>
    </main>
    </center>     


    <!-- FIN MAIN EDGAR-->

    <!-- INICIO FOOTER -->
    <footer>

    </footer>
    <!-- FIN FOOTER -->

    
</body>


</body>


</html>
