<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de usuario</title>
</head>
<body>

    <!-- Inicio contenedor Main Jose -->
    <main>
        <center>
        <div>
            <img src="" alt="logo empresa">
        </div>
        <div>
            <h2>
                Crear cuenta
            </h2>
        </div>
        <div>
            
                <form action="">
                    <label for="">Nombres:</label>
                    <input 
                        type="text" 
                        placeholder="user" 
                        required
                    >
                    <br>
                    <label for="">Apellidos:</label>
                    <input 
                        type="text" 
                        placeholder="user" 
                        required
                    >
                    <br>
                    <label for="">Email:</label>
                    <input 
                        type="email" 
                        placeholder="user@user.com" 
                        required
                    >
                    <br>
                    <label for="">Dni:</label>
                    <input 
                        type="number" 
                        min="00000000" 
                        max="99999999" 
                        placeholder="78455623"
                        required
                    >
                    <br>
                    <label for="">Contraseña:</label>
                    <input 
                        type="password" 
                        minlength="8"
                        required
                    >
                    <br>
                    <label for="">Comfirmar Contraseña:</label>
                    <input 
                        type="password" 
                        minlength="8"
                        required
                    >
                    <br>
                    <input 
                        type="checkbox"
                        required
                        > Acceptar T&C
                    <br>
                    <input 
                        type="checkbox"
                        required
                        > Recibir promociones via e-mail
                    <br>
                    <button type="submit">Enviar</button>
                </form>
            
        </div>
        <div style="display: flex; align-items: center; text-align: center;">
            <hr style="flex: 1; border: none; border-top: 1px solid #ccc;">
            <span style="padding: 0 10px; font-weight: bold;">O, ingresar con:</span>
        <hr style="flex: 1; border: none; border-top: 1px solid #ccc;">
        </div>
        <br>
        <div>
            <img src="" alt="icono google">
            <img src="" alt="icono microsoft">
            <img src="" alt="icono facebook">
            <img src="" alt="icono apple">
        </div>
        <div>
            <p>
                Ya estas registrado? 
                    <a 
                        href="login.html"
                        style="text-decoration: none;"
                        >
                            <span 
                                style="color: blue; 
                                font-weight: bolder;"> 
                                Ingresa aca
                            </span>
                    </a>
            </p>
        </div>
        </center>
    </main>
    <!-- Inicio contenedor Main Jose -->

    <!-- INICIO FOOTER OMAR-->
    <footer>

    </footer>
    <!-- FIN FOOTER OMAR-->
</body>
</html>
