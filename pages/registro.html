<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de usuario</title>
</head>
<body bgcolor="#1E3A8A">

    <main>
        <font color="#fff">
        <!-- Logo y título -->
        <table width="60%" align="center">
            <tr align="center">
                <td>
                    <img src="../assets/images/png/logo.png" alt="logo empresa" width="250" height="150">
                </td>
            </tr>
            <tr align="center">
                <td><h3>Crear cuenta</h3></td>
            </tr>
        </table>

        <!-- Formulario -->
        <form>
            <table width="60%" align="center" cellspacing="8">
                <tr>
                    <td align="right"><label for="nombres">Nombres:</label></td>
                    <td><input type="text" id="nombres" placeholder="Ingresa tus Nombres" required></td>
                </tr>
                <tr>
                    <td align="right"><label for="apellidos">Apellidos:</label></td>
                    <td><input type="text" id="apellidos" placeholder="Ingresa tus Apellidos" required></td>
                </tr>
                <tr>
                    <td align="right"><label for="correo">Correo Electrónico:</label></td>
                    <td><input type="email" id="correo" placeholder="Ingresa tu email" required></td>
                </tr>
                <tr>
                    <td align="right">Documento de Identidad:</td>
                    <td>
                        <input type="radio" name="doc" id="dni" required>
                        <label for="dni">DNI</label> 
                        <input type="radio" name="doc" id="pasaporte" required>
                        <label for="pasaporte">Pasaporte</label> 
                    </td>
                </tr>
                <tr>
                    <td align="right"><label for="numdoc">Número de Documento:</label></td>
                    <td><input type="number" id="numdoc" placeholder="Número" required></td>
                </tr>
                <tr>
                    <td align="right"><label for="pass">Contraseña:</label></td>
                    <td><input type="password" id="pass" minlength="8" placeholder="Ingresa tu contraseña" required></td>
                </tr>
                <tr>
                    <td align="right"><label for="confpass">Confirma tu Contraseña:</label></td>
                    <td><input type="password" id="confpass" minlength="8" placeholder="Confirma tu contraseña" required></td>
                </tr>
                <tr>
                    <td></td>
                    <td>
                        <input type="checkbox" id="check-tc" required> 
                        <label for="check-tc">Aceptar T&C</label>
                    </td>
                </tr>
                <tr>
                    <td></td>
                    <td>
                        <input type="checkbox" id="check-promo"> 
                        <label for="check-promo">Recibir promociones vía e-mail</label>
                    </td>
                </tr>
                <tr>
                    <td></td>
                    <td><button type="submit">Enviar</button></td>
                </tr>
            </table>
        </form>

        <!-- Login alternativo -->
        <table align="center" width="60%">
            <tr>
                <td>
                    <fieldset align="center">
                        <legend><h3>O, ingresar con:</h3></legend>
                        <table align="center" cellspacing="10">
                            <tr align="center">
                                <td>
                                    <a href="https://www.gmail.com" target="_blank">
                                        <img src="../assets/images/png/google.png" alt="Google" width="40">
                                    </a>
                                </td>
                                <td></td>
                                <td></td>
                                <td></td>
                                <td>
                                    <a href="https://www.microsoft.com" target="_blank">
                                        <img src="../assets/images/png/microsoft.png" alt="Microsoft" width="40">
                                    </a>
                                </td>
                                <td></td>
                                <td></td>
                                <td></td>
                                <td>
                                    <a href="https://www.facebook.com" target="_blank">
                                        <img src="../assets/images/png/facebook.png" alt="Facebook" width="40">
                                    </a>
                                </td>
                                <td></td>
                                <td></td>
                                <td></td>
                                <td>
                                    <a href="https://www.apple.com/" target="_blank">
                                        <img src="../assets/images/png/apple.png" alt="Apple" width="40">
                                    </a>
                                </td>
                            </tr>
                        </table>
                    </fieldset>
                </td>
            </tr>
        </table>

        <!-- Link a login -->
        <div align="center">
            <p>
                ¿Ya estás registrado? 
                <a href="login.html" style="text-decoration: none; color: #ffff00; font-weight: bold;">
                    Ingresa acá
                </a>
            </p>
        </div>
        </font>
    </main>

    <!-- Footer -->
    <footer>
        <marquee>
            <font color="#fff">
                <small>Ucal - Grupo 05 - 2026</small></marquee>
            </font>
    </footer>

</body>
</html>
