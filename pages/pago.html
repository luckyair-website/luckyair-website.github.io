<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pago</title>
</head>

<body bgcolor="#1E3A8A">
    <header>

        <table width="100%" height="80" border="1">
            <tr>
                <!-- Inicio contenedor-logo -->
                <td align="left" width="200" height="100">
                    <a href="../index.html">
                        <img src="../assets/images/png/logo.png" alt="Logo de la empresa" width="200px" height="100px">
                    </a>
                </td>
                <!-- Fin contenedor-logo -->

                <!-- Inicio contenedor de navegacion -->
                <td align="center">
                    <nav>
                        <font size="5">
                            <a href="../index.html">
                                <font color="blue">
                                    <small>Home</small>
                                </font>
                            </a>
                            &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
                            <a href="vuelos.html">
                                <font color="blue">
                                    <small>Vuelos</small>
                                </font>
                            </a>
                            &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
                            <a href="beneficios.html">
                                <font color="blue">
                                    <small>Beneficios</small>
                                </font>
                            </a>
                        </font>
                    </nav>
                </td>
                <!-- Fin contenedor de navegacion -->

                <!-- Inicio contenedor de Icono usuario -->
                <td align="center" width="200">
                    <a href="login.html">
                        <img src="../assets/images/svg/user.svg" alt="Icono de usuario" width="40">
                    </a>

                </td>
                <!-- Fin contenedor de Icono usuario -->
            </tr>
        </table>
    </header>
    <!-- Fin contenedor header -->
    <br>
    <!-- INICIO MAIN EDGAR-->

    <main>
        <font color="#000">
            <table width="55%" align="center" cellpadding="20" cellspacing="10" bgcolor="#FFFFFF" border="1">
                <tr valign="top">
                    <td width="50%">
                        <h3>USUARIO FRECUENTE&nbsp;&nbsp;&nbsp;<small>
                                <font color="green">GUARDADO</font>
                            </small></h3>

                        <table width="100%" cellpadding="5">
                            <tr>
                                <td>
                                    <input type="radio" name="pago" id="visa-prev" checked>
                                    <label for="visa-prev">
                                        <img src="../assets/images/png/card.png" alt="Visa" width="30">
                                        <b>Visa **** 1234</b><br>
                                        <small>Vence 08/27</small>
                                    </label>
                                </td>
                            </tr>
                            <tr>
                                <td>
                                    <input type="radio" name="pago" id="mc-prev">
                                    <label for="mc-prev">
                                        <img src="../assets/images/png/card.png" alt="Mastercard" width="30">
                                        <b>Mastercard **** 5678</b><br>
                                        <small>Vence 03/26</small>
                                    </label>
                                </td>
                            </tr>
                        </table>

                        <br>
                        <div align="center">
                            <button type="submit"><a href="../pages/pagofinal.html">Pagar ahora</a></button>
                        </div>

                        <br>
                        <details>
                            <summary><b>Ver QR de pago</b></summary>
                            <div align="center">
                                <br>
                                <table cellpadding="5">
                                    <tr>
                                        <td><img src="../assets/images/png/qr.png" alt="QR de pago" width="150"></td>
                                    </tr>
                                </table>
                            </div>
                        </details>

                        <p align="center">
                            <small>Compatible con:</small><br>
                            <img src="../assets/images/png/alipay.png" alt="Alipay" width="40">
                            <img src="../assets/images/png/wechat.png" alt="WeChat" width="40">
                            <img src="../assets/images/png/unionpay.png" alt="UnionPay" width="40">
                        </p>
                    </td>

                    <td width="50%">
                        <h3>USUARIO NUEVO&nbsp;&nbsp;&nbsp;<small>
                                <font color="green">PRIMERA VEZ</font>
                            </small></h3>

                        <table width="100%" cellpadding="5">
                            <tr>
                                <td colspan="2">
                                    <img src="../assets/images/png/card.png" alt="tarjeta" width="30">&nbsp;
                                    <label for="card-num">Número de tarjeta:</label><br>
                                    <input type="text" id="card-num" placeholder="0000 0000 0000 0000" size="30" name=""
                                        required>
                                </td>
                            </tr>
                            <tr>
                                <td width="50%">
                                    <label for="exp">Vencimiento:</label><br>
                                    <input type="text" id="exp" placeholder="MM/AA" size="10" required>
                                </td>
                                <td width="50%">
                                    <label for="cvv">CVV:</label><br>
                                    <input type="password" id="cvv" placeholder="123" size="5" required>
                                </td>
                            </tr>
                            <tr>
                                <td colspan="2">
                                    <label for="card-name">Nombre en tarjeta:</label><br>
                                    <input type="text" id="card-name" placeholder="Nombre Apellido" size="30" required>
                                </td>
                            </tr>
                            <tr>
                                <td colspan="2" align="center">
                                    <hr>
                                    <p><small>O escanea para pago rápido</small></p>
                                    <table cellpadding="5">
                                        <tr>
                                            <td><img src="../assets/images/png/qr.png" alt="QR pequeño" width="150">
                                            </td>
                                        </tr>
                                    </table>
                                </td>
                            </tr>
                            <tr>
                                <td colspan="2">
                                    <input type="checkbox" id="save" name=""> <label for="save"><small>Guardar
                                            tarjeta</small></label>
                                </td>
                            </tr>
                        </table>
                        <br>
                        <div align="center">
                            <button type="submit"><a href="../pages/pagofinal.html">Pagar ahora</a></button>
                        </div>
                    </td>
                </tr>
            </table>
        </font>
    </main>


    <!-- FIN MAIN EDGAR-->

    <!-- INICIO FOOTER -->
    <footer>
        <section>
            <h3>Redes Sociales</h3>
            <p>Facebook | Instagram</p>
        </section>

        <section>
            <h3>Contacto</h3>
            <p>soporte@luckyair.com</p>
        </section>

        <p>Lucky Air © 2026</p>
    </footer>
    <!-- FIN FOOTER -->
</body>

</html>
