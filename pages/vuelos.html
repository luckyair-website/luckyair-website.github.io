<!DOCTYPE html>
<html lang="es">
<head>
        <meta charset="UTF-8">
        <title>Buscar Vuelos - Lucky Air</title>
</head>
<body>

    <!-- Inicio Header -->
     <iframe src="../header.html" width="100%" height="120" scrolling="no" frameborder="0"></iframe>
    <!-- Fin Header -->


    <main>

        <!-- TITULO -->
        <font color="white">
            <h2>Encuentra tu próximo destino</h2>
            <p>Vuela barato y fácil con Lucky Air</p>
        </font>

        <br>

        <!-- FORMULARIO -->
        <form>

            <fieldset style="width:60%; background:white; padding:15px;">

            <center> <legend>Buscar vuelos</legend> </center>

                <p>Origen: <input type="text"></p>
                <p>Destino: <input type="text"></p>
                <p>Ida: <input type="date"></p>
                <p>Vuelta: <input type="date"></p>
                <p>Pasajeros: <input type="number" min="1" value="1"></p>

                <button type="submit">Buscar vuelos</button>

            </fieldset>

        </form>

        <br><br>

        <!-- OFERTAS -->
        <font color="white">
            <h2>Ofertas del día</h2>
        </font>

        <table bgcolor="white" cellpadding="25" cellspacing="25">

            <tr>

                <td align="center" width="250">

                    <h3>Lima → Cusco</h3>
                    <p>Desde $120</p>

                    <a href="/pages/pago.html">
                        <button type="button">Seleccionar</button>
                    </a>

                </td>

                <td width="50"></td>

                <td align="center" width="250">

                    <h3>Lima → Arequipa</h3>
                    <p>Desde $95</p>

                    <a href="/pages/pago.html">
                        <button type="button">Seleccionar</button>
                    </a>

                </td>

            </tr>

        </table>

    </main>

    <!-- INICIO FOOTER OMAR-->
    <iframe src="../footer.html" width="100%" height="450" scrolling="no" frameborder="0"></iframe>
    <!-- FIN FOOTER OMAR-->

</body>
</html>
