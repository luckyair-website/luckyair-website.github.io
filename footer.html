<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Footer</title>
</head>
<body>

    <footer role="contentinfo">
        <table width="100%" height="400" border="1">
            
            <tr align="center">
                <td>
                    <!-- Redes sociales -->
                    <div>
                        <font color="white">
                            <h3>
                                Siguenos en nuestras Redes sociales
                            </h3>
                        </font>
                        
                        <div>
                            <a href="https://www.facebook.com" target="_blank"><img src="assets/images/png/facebook.png" alt="facebook logo" width="40"></a>
                            &nbsp;&nbsp;&nbsp;
                            <a href="https://www.instagram.com" target="_blank"><img src="assets/images/png/instagram.png" alt="instagram logo" width="40"></a>
                            &nbsp;&nbsp;&nbsp;
                            <a href="https://www.x.com" target="_blank"><img src="assets/images/png/x.png" alt="x logo" width="40"></a>
                        </div>
                    </div>
                </td>
                <td>
                    <!-- Contacto -->
                    <div>
                        <font color="white">
                            <h3>
                                Contactanos / Reclamos
                            </h3>
                            <p>📞 51+ 999 666 999</p>
                            <p>📧 luckyaircontactos@gmail.com</p>
                        </font>
                    </div>
                </td>
                <td>
                    <!-- Formulario -->
                    <div>
                        <form action="">
                            <font color="white">
                                <h3>Escribenos</h3>
                            </font>
                            <input type="text" id="nombres" placeholder="Nombre y Apellidos" ><br><br>
                            <input type="text" id="asunto" placeholder="Asunto" ><br><br>
                            <input type="email" id="email" placeholder="Correo electronico" ><br>
                            <br>
                            <textarea id="comentarios" name="comentarios" rows="3" cols="20" placeholder="Escribe aquí tu mensaje..."></textarea><br><br>
                            <button type="submit">
                                Contactanos
                            </button>
                        </form>
                    </div>
                </td>
            </tr>
        </table>

        <!-- Línea inferior -->
        <font color="white">
            <p align="center">
                lucky air @ 2026
            </p>
        </font>

    </footer>
    <!-- FIN FOOTER OMAR-->
</body>
</html>
